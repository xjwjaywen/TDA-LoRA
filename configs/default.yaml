model:
  pretrained_model: "stabilityai/stable-diffusion-2-1-base"
  resolution: 512

lora:
  base_rank: 16
  target_modules: ["to_q", "to_v", "to_k", "to_out.0"]

snr:
  gamma: 5.0
  domain_boost: 1.0

training:
  num_steps: 800
  learning_rate: 1.0e-4
  batch_size: 2
  gradient_accumulation: 2
  mixed_precision: "fp16"
  seed: 42

dataset:
  name: "cub200"
  data_dir: "./data"
  num_shots: 10
  class_name: null

evaluation:
  eval_every: 100
  num_eval_images: 50
  metrics: ["fid", "lpips_diversity", "dino_similarity", "clip_score"]

output:
  output_dir: "./outputs"
  save_every: 200
  log_every: 10
