model:
  pretrained_model: "stabilityai/stable-diffusion-2-1-base"
  resolution: 512

lora:
  base_rank: 8
  alpha: 16
  target_modules: ["to_q", "to_v", "to_k", "to_out.0"]

tda:
  # Timestep-aware rank scaling
  timestep_bins: 3  # [high_noise, mid_noise, low_noise]
  timestep_rank_scales: [0.5, 1.0, 1.5]  # high noise -> low rank, low noise -> high rank

  # Domain-aware scaling
  domain_gap_method: "clip"  # how to estimate domain gap
  domain_scale_factor: 0.3  # how much domain gap affects rank: rank *= (1 - factor * gap)

  # Layer-wise importance (gradient-guided)
  warmup_steps: 50  # steps to collect gradient stats
  layer_importance_top_k: 0.5  # top 50% layers get full rank, rest get reduced

training:
  num_steps: 800
  learning_rate: 1.0e-4
  batch_size: 2
  gradient_accumulation: 2
  mixed_precision: "fp16"
  seed: 42

dataset:
  name: "cub200"
  data_dir: "./data"
  num_shots: 10
  class_name: null

evaluation:
  eval_every: 100
  num_eval_images: 50
  metrics: ["fid", "lpips_diversity", "dino_similarity", "clip_score"]

output:
  output_dir: "./outputs"
  save_every: 200
  log_every: 10
